name : CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: install dependencies
        Run: pip install -r /App/requirements.txt

      - name: Run tests
        working_directory: App/
        Run: pytest

      - name: Build Docker
        Run: docker build -t my-f1-ml .




      




    